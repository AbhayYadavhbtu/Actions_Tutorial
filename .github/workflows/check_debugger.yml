name: Debug Code Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-debug-code:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Scan for debug statements
      run: |

        echo "Checking for debugger statements..."

        if grep -rE "debugger|console\.log" src/; then
          echo "❌ Debug code found in project"
          exit 1
        else
          echo "✅ No debug code found"
        fi